name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install playsound --only-binary playsound
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile `
          --add-data "pip-beep.mp3;." `
          --add-data "pip-countdown-beep.mp3;." `
          --add-data "pip-notification.mp3;." `
          --add-data "pip-short-tone.mp3;." `
          --add-data "siren-car-honk.mp3;." `
          --add-data "siren-machinegun.mp3;." `
          --add-data "siren-police.mp3;." `
          --add-data "LICENSE;." `
          --add-data "README.md;." `
          --add-data "Tournament Draw.csv;." `
          --add-data "ZIGBEE_SETUP.md;." `
          --add-data "settings.json;." `
          --add-data "arduino_siren_button.ino;." `
          --hidden-import=pygame `
          --hidden-import=paho.mqtt.client `
          --hidden-import=serial `
          uwh.py

    - name: Upload Executable
      uses: actions/upload-artifact@v7.0.1
      with:
        name: uwh-windows-exe
        path: dist/uwh.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3.0.0
      with:
        files: dist/uwh.exe
        tag_name: release-${{ github.run_number }}
        name: UWH Scoring App - Build ${{ github.run_number }}
        body: |
          Underwater Hockey Scoring Desk Kit executable
          
          Built from commit: ${{ github.sha }}
          Build date: ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
